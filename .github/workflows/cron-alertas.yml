name: Cron Alertas FlotaControl

# GitHub Actions no garantiza precisión al minuto exacto en "schedule"
# (el mínimo soportado es cada 5 minutos, y puede haber demoras extra
# en horas de mucha carga). Por eso cron_alertas.php ya no compara la
# hora de forma exacta: usa una ventana ("hora <= horaActual") y evita
# duplicados revisando alertas_historial. Con eso, unos minutos de
# retraso no hacen que se pierda un aviso.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegador Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Ejecutar cron_alertas.php vía navegador headless
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
        run: node run-cron.js
