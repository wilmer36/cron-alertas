name: Disparar cron de alertas FlotaControl

on:
  schedule:
    # Cada 5 minutos, todo el día (hora UTC, GitHub no usa hora Lima).
    # Es el mínimo que permite GitHub Actions; no hay forma de bajar de esto.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # permite lanzarlo manualmente desde la pestaña Actions

jobs:
  disparar-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Puppeteer (Chromium incluido)
        run: npm install puppeteer@22

      - name: Abrir la URL del cron con navegador real
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
        run: node .github/workflows/ping.js
