name: Cron Alertas FlotaControl

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegador Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Ejecutar cron_alertas.php via navegador headless
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
        run: node run-cron.js
